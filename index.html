<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Polla Familia Mundial García 2026 🏆</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  
  <style>
    :root {
      --primary: #1a73e8;
      --success: #34a853;
      --warning: #f9ab00;
      --danger: #ea4335;
      --dark: #202124;
      --light: #f8f9fa;
      --colombia: #fcd116;
      --colombia-blue: #003893;
      --colombia-red: #ce1126;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--dark);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    header {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    header h1 {
      font-size: 1.8rem;
      color: var(--primary);
      margin-bottom: 5px;
    }
    
    header p {
      color: #666;
      font-size: 0.95rem;
    }
    
    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .card h2 {
      color: var(--primary);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
    }
    
    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--dark);
    }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    
    button:hover {
      background: #1557b0;
      transform: translateY(-2px);
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button.success {
      background: var(--success);
    }
    
    button.danger {
      background: var(--danger);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Sections */
    .section {
      display: none;
    }
    
    .section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Navigation */
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .nav-tabs button {
      width: auto;
      padding: 8px 16px;
      font-size: 0.9rem;
      background: #e8f0fe;
      color: var(--primary);
    }
    
    .nav-tabs button.active {
      background: var(--primary);
      color: white;
    }
    
    .nav-tabs button.danger {
      background: #fee;
      color: var(--danger);
    }
    
    .nav-tabs button.danger.active {
      background: var(--danger);
      color: white;
    }
    
    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f8f9fa;
      font-weight: 600;
      color: var(--dark);
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    /* Badges */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .badge-gray { background: #6c757d; color: white; }
    .badge-yellow { background: var(--warning); color: var(--dark); }
    .badge-colombia { 
      background: linear-gradient(90deg, var(--colombia-blue), var(--colombia), var(--colombia-red)); 
      color: white; 
    }
    
    /* Alerts */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    
    /* Match Card */
    .match-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid var(--primary);
    }
    
    .match-card.colombia {
      border-left-color: var(--colombia);
      background: linear-gradient(135deg, #fff9e6 0%, #fff 100%);
    }
    
    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #666;
    }
    
    .match-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    
    .team {
      text-align: center;
      flex: 1;
    }
    
    .team-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .vs {
      color: #999;
      font-weight: 500;
    }
    
    .prediction-inputs {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    
    .prediction-inputs input {
      width: 60px;
      text-align: center;
      padding: 8px;
    }

    .locked {
      opacity: 0.6;
      pointer-events: none;
      position: relative;
